<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Scavenger Hunt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- Slide 1: Lock Screen -->
        <div class="slide slide-l" id="slide1">
            <div class="lock-container">
                <div class="polaroid-wrapper">
                    <div class="polaroid">
                        <img src="pic5.jpeg" alt="Memory">
                        <div class="blue-bow"></div>
                    </div>
                </div>
                <div class="keypad-wrapper">
                    <h2>Enter the passcode</h2>
                    <p class="hint">"Its our fav code"</p>
                    <div id="passcode-display" class="passcode-dots">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <div class="keypad">
                        <button onclick="pressKey(1)">1</button>
                        <button onclick="pressKey(2)">2</button>
                        <button onclick="pressKey(3)">3</button>
                        <button onclick="pressKey(4)">4</button>
                        <button onclick="pressKey(5)">5</button>
                        <button onclick="pressKey(6)">6</button>
                        <button onclick="pressKey(7)">7</button>
                        <button onclick="pressKey(8)">8</button>
                        <button onclick="pressKey(9)">9</button>
                        <button onclick="pressKey(0)">0</button>
                        <button onclick="clearPasscode()">C</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Slide 2: Birthday Greeting -->
        <div class="slide slide-w" id="slide2">
            <div class="slide-content">
                <div class="illustration-wrapper">
                    <!-- Line Friends Bear & Bunny with cake -->
                    <img src="gif1.gif" alt="Happy Birthday characters" class="character-img">
                </div>
                <h1 class="bubble-text">HAPPY BIRTHDAY</h1>
                <button class="btn btn-black btn-next" onclick="nextSlide(3)">NEXT</button>
            </div>
        </div>

        <!-- Slide 3: Gift Selection 1 -->
        <div class="slide slide-w" id="slide3">
            <div class="slide-content">
                <h1 class="bubble-text">Gift for you</h1>
                <div class="gifts-container">
                    <img src="pic6.avif" alt="Gift" class="gift-img" onclick="nextSlide(4)">
                    <img src="pic6.avif" alt="Gift" class="gift-img" onclick="nextSlide(4)">
                    <img src="pic6.avif" alt="Gift" class="gift-img" onclick="nextSlide(4)">
                </div>
                <h2 class="bubble-text">Click any gift to open</h2>
            </div>
        </div>

        <!-- Slide 4: Cake Interaction -->
        <div class="slide slide-r" id="slide4">
            <div class="slide-content">
                <div class="cake-container" id="cake-interaction">
                    <svg viewBox="0 0 100 100" class="cake-svg">
                        <!-- Cake Base -->
                        <path d="M20 80 Q20 70 30 70 L70 70 Q80 70 80 80 L80 90 Q80 100 70 100 L30 100 Q20 100 20 90 Z"
                            fill="#ADD8E6" />
                        <path d="M30 60 Q30 50 40 50 L60 50 Q70 50 70 60 L70 70 Q70 80 60 80 L40 80 Q30 80 30 70 Z"
                            fill="#F0F8FF" />
                        <!-- Candles -->
                        <g class="candles">
                            <rect x="35" y="40" width="2" height="10" fill="pink" />
                            <rect x="40" y="38" width="2" height="12" fill="pink" />
                            <rect x="45" y="40" width="2" height="10" fill="pink" />
                            <rect x="50" y="38" width="2" height="12" fill="pink" />
                            <rect x="55" y="40" width="2" height="10" fill="pink" />
                            <rect x="60" y="38" width="2" height="12" fill="pink" />
                            <rect x="65" y="40" width="2" height="10" fill="pink" />
                            <!-- Flames -->
                            <g class="flames">
                                <circle cx="36" cy="38" r="1.5" fill="orange" class="flame" />
                                <circle cx="41" cy="36" r="1.5" fill="orange" class="flame" />
                                <circle cx="46" cy="38" r="1.5" fill="orange" class="flame" />
                                <circle cx="51" cy="36" r="1.5" fill="orange" class="flame" />
                                <circle cx="56" cy="38" r="1.5" fill="orange" class="flame" />
                                <circle cx="61" cy="36" r="1.5" fill="orange" class="flame" />
                                <circle cx="66" cy="38" r="1.5" fill="orange" class="flame" />
                            </g>
                        </g>
                    </svg>
                </div>
                <button class="btn btn-blow" onclick="blowCandles()">BLOW</button>
            </div>
        </div>

        <!-- Slide 5: Post-Blow Greeting -->
        <div class="slide slide-r" id="slide5">
            <div class="slide-content">
                <div class="cake-container">
                    <svg viewBox="0 0 100 100" class="cake-svg">
                        <!-- Cake Base -->
                        <path d="M20 80 Q20 70 30 70 L70 70 Q80 70 80 80 L80 90 Q80 100 70 100 L30 100 Q20 100 20 90 Z"
                            fill="#ADD8E6" />
                        <path d="M30 60 Q30 50 40 50 L60 50 Q70 50 70 60 L70 70 Q70 80 60 80 L40 80 Q30 80 30 70 Z"
                            fill="#F0F8FF" />
                        <!-- Candles without flames -->
                        <g class="candles">
                            <rect x="35" y="40" width="2" height="10" fill="pink" />
                            <rect x="40" y="38" width="2" height="12" fill="pink" />
                            <rect x="45" y="40" width="2" height="10" fill="pink" />
                            <rect x="50" y="38" width="2" height="12" fill="pink" />
                            <rect x="55" y="40" width="2" height="10" fill="pink" />
                            <rect x="60" y="38" width="2" height="12" fill="pink" />
                            <rect x="65" y="40" width="2" height="10" fill="pink" />
                        </g>
                    </svg>
                </div>
                <h1 class="bubble-text white">happy birthday my love</h1>
                <button class="btn btn-white" onclick="prevSlide(4)">BACK</button>
                <button class="btn btn-white btn-next" onclick="nextSlide(6)">NEXT</button>
            </div>
        </div>

        <!-- Slide 6: Gift Selection 2 -->
        <div class="slide slide-w" id="slide6">
            <div class="slide-content">
                <h1 class="bubble-text">Gift for you - click any gift to open</h1>
                <div class="gifts-container">
                    <div class="gift-box" onclick="nextSlide(7)">
                        <div class="box-top"></div>
                        <div class="box-side"></div>
                    </div>
                    <div class="gift-box" onclick="nextSlide(7)">
                        <div class="box-top"></div>
                        <div class="box-side"></div>
                    </div>
                    <div class="gift-box" onclick="nextSlide(7)">
                        <div class="box-top"></div>
                        <div class="box-side"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Slide 7: Photo Collage -->
        <div class="slide slide-r" id="slide7">
            <div class="slide-content">
                <div class="scrapbook-frame">
                    <div class="newsprint-bg">
                        <img src="pic2.jpeg" alt="Eyes Close-up" class="collage-img">
                        <div class="newsprint-text">LOVE LOVE LOVE</div>
                        <div class="stars">✨ ⭐ ✨</div>
                    </div>
                </div>
                <button class="btn btn-white btn-next" onclick="nextSlide(8)">NEXT</button>
            </div>
        </div>

        <!-- Slide 8: Gift Selection 3 -->
        <div class="slide slide-w" id="slide8">
            <div class="slide-content">
                <h1 class="bubble-text">Gift for you - click any gift to open</h1>
                <div class="gifts-container">
                    <div class="gift-box" onclick="nextSlide(9)">
                        <div class="box-top"></div>
                        <div class="box-side"></div>
                    </div>
                    <div class="gift-box" onclick="nextSlide(9)">
                        <div class="box-top"></div>
                        <div class="box-side"></div>
                    </div>
                    <div class="gift-box" onclick="nextSlide(9)">
                        <div class="box-top"></div>
                        <div class="box-side"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Slide 9: Love Letter -->
        <div class="slide slide-r" id="slide9">
            <div class="slide-content">
                <div class="letter-container">
                    <div class="envelope blue">
                        <div class="letter">
                            <p>"the calm I never knew I needed... I love you, more than I ever say out loud."</p>
                        </div>
                    </div>
                    <div class="film-strip">
                        <img src="pic1.jpeg" alt="Film 1">
                        <img src="pic2.jpeg" alt="Film 2">
                        <img src="pic3.jpeg" alt="Film 3">
                    </div>
                </div>
                <button class="btn btn-white" onclick="nextSlide(1)">BACK</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
